{% extends "base.html" %}

{% block title %}IC Games - Estadístiques{% endblock %}

{% block head %}
<!-- Re-aprofitem el disseny principal de fons de home.css per al fons i estrelles -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% endblock %}

{% block content %}
<div class="home-shell">
    <div class="home-bg" aria-hidden="true"></div>

    <!-- Utilitzem una classe pròpia enlloc de home-main per no heretar el seu grid de columnes -->
    <main class="dashboard-main" id="main-dashboard">
        <header class="dashboard-header">
            <p class="home-eyebrow">Analítica d'Usuari</p>
            <h1 class="home-title">Estadístiques</h1>
            <p class="home-lede">Visualitza la teva evolució i les teves partides jugades.</p>
        </header>

        <div class="dashboard-container">
            <div class="targeta">
                <h3>HISTÒRIC DE PUNTUACIÓ (Temps)</h3>
                <canvas id="graficHistoric"></canvas>
            </div>

            <div class="targeta">
                <h3>TOTAL PARTIDES JUGADES</h3>
                <canvas id="graficErrors"></canvas>
            </div>
        </div>
    </main>
</div>

<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
{% endblock %}
