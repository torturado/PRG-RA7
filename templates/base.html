<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}IC Games{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/topbar.css') }}">
    {% block head %}{% endblock %}
</head>

<body class="has-app-topbar">
    {% if usuari %}
    <aside class="app-topbar">
        <a href="{{ url_for('home') }}" class="app-topbar__back">Torna a l'inici</a>
        <div class="app-topbar__session">
            <div class="app-topbar__user-info">
                <span class="app-topbar__user-label">Usuari connectat</span>
                <strong class="app-topbar__user-name">{{ usuari }}</strong>
            </div>
            <form action="{{ url_for('logout') }}" method="POST" class="app-topbar__logout-form">
                <button type="submit" class="app-topbar__logout">Tanca la sessió</button>
            </form>
        </div>
    </aside>
    {% endif %}

    <main class="page-content">
        {% block content %}{% endblock %}
    </main>
</body>

</html>
